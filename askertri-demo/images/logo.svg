<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M15 15 L65 8 L90 15 L90 55 Q90 95 52.5 110 Q15 95 15 55 Z" fill="url(#shieldGrad)" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Inner shield highlight -->
  <path d="M22 22 L65 16 L83 22 L83 52 Q83 87 52.5 100 Q22 87 22 52 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  
  <!-- Swim icon -->
  <g transform="translate(30, 28) scale(0.45)" fill="white" opacity="0.9">
    <circle cx="8" cy="6" r="5"/>
    <path d="M0 22 Q8 15 16 22 Q24 29 32 22" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M12 12 L20 18 L12 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Bike icon -->
  <g transform="translate(48, 26) scale(0.4)" fill="white" opacity="0.9">
    <circle cx="8" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="32" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
    <path d="M8 22 L18 8 L28 8 M18 8 L22 22 L32 22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="22" cy="4" r="3"/>
  </g>
  
  <!-- Run icon -->
  <g transform="translate(62, 26) scale(0.4)" fill="white" opacity="0.9">
    <circle cx="16" cy="5" r="4.5"/>
    <path d="M10 14 L16 24 L22 30 M16 24 L8 34 M16 14 L24 10 M16 14 L10 22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- "ASKER" text in shield -->
  <text x="52.5" y="72" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="1">ASKER</text>
  
  <!-- "TRIATHLON" ribbon -->
  <path d="M20 78 L85 78 L80 88 L85 98 L20 98 L25 88 Z" fill="url(#accentGrad)"/>
  <text x="52.5" y="92" text-anchor="middle" fill="#0d1f3c" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="800" letter-spacing="2">TRIATHLON</text>
  
  <!-- Club name -->
  <text x="120" y="52" fill="currentColor" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="2">ASKER</text>
  <text x="120" y="78" fill="currentColor" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="5">TRIATHLON</text>
  <text x="120" y="98" fill="url(#accentGrad)" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="3">KLUBB</text>
</svg>
